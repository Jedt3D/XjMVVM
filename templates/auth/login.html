{% extends "layouts/base.html" %}

{% block title %}Log In{% endblock %}

{% block content %}
<h1>Log In</h1>

{% if error_message %}
<div style="color:#721c24; background:#f8d7da; padding:10px 14px; border-radius:4px; margin-bottom:16px; max-width:360px;">
  {{ error_message }}
</div>
{% endif %}

<script>
async function sha256hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}
</script>

<form method="post" action="/login" style="max-width:360px;"
      x-data="{
        hashed: false,
        async handleSubmit(e) {
          if (this.hashed) return;
          const pwEl = document.getElementById('password');
          pwEl.value = await sha256hex(pwEl.value);
          this.hashed = true;
          e.target.submit();
        }
      }"
      @submit.prevent="handleSubmit($event)">
  {% if next_url %}<input type="hidden" name="next" value="{{ next_url }}">{% endif %}
  <div>
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="username" required>
  </div>
  <div>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password" required>
  </div>
  <p>
    <button type="submit" class="btn btn-primary">Log In</button>
  </p>
  <p style="font-size:0.9em;">Don't have an account? <a href="/signup">Sign up</a></p>
</form>
{% endblock %}
