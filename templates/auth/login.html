{% extends "layouts/base.html" %}

{% block title %}Log In{% endblock %}

{% block content %}
<h1>Log In</h1>

<form id="login-form" method="post" action="/login" style="max-width:360px;">
  <div>
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="username" required>
  </div>
  <div>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password" required>
  </div>
  <p>
    <button type="submit" class="btn btn-primary">Log In</button>
  </p>
  <p style="font-size:0.9em;">Don't have an account? <a href="/signup">Sign up</a></p>
</form>

<script>
async function sha256hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

document.getElementById('login-form').addEventListener('submit', async function(e) {
  if (this.dataset.hashed) return;
  e.preventDefault();
  const username = document.getElementById('username').value;
  const pwEl = document.getElementById('password');
  const hash = await sha256hex(pwEl.value);
  pwEl.value = hash;
  localStorage.setItem('_auth_user', username);
  sessionStorage.setItem('_flash_msg',  'Welcome back, ' + username + '!');
  sessionStorage.setItem('_flash_type', 'success');
  this.dataset.hashed = '1';
  this.submit();
});
</script>
{% endblock %}
