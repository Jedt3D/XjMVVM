{% extends "layouts/base.html" %}

{% block title %}Sign Up{% endblock %}

{% block content %}
<h1>Sign Up</h1>

<script>
async function sha256hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}
</script>

<form method="post" action="/signup" style="max-width:360px;"
      x-data="{
        pwError: '',
        hashed: false,
        async handleSubmit(e) {
          if (this.hashed) return;
          const pwEl = document.getElementById('password');
          const cfEl = document.getElementById('password_confirm');
          const pw = pwEl.value, cf = cfEl.value;
          if (pw.length < 6) { this.pwError = 'Password must be at least 6 characters.'; return; }
          if (pw !== cf)     { this.pwError = 'Passwords do not match.'; return; }
          this.pwError = '';
          const hash = await sha256hex(pw);
          pwEl.value = hash;
          cfEl.value = hash;
          const username = document.getElementById('username').value;
          localStorage.setItem('_auth_user', username);
          sessionStorage.setItem('_flash_msg', 'Account created! Welcome, ' + username + '!');
          sessionStorage.setItem('_flash_type', 'success');
          this.hashed = true;
          e.target.submit();
        }
      }"
      @submit.prevent="handleSubmit($event)">
  <div>
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="username" required>
  </div>
  <div>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="new-password" required minlength="6">
  </div>
  <div>
    <label for="password_confirm">Confirm Password</label>
    <input type="password" id="password_confirm" name="password_confirm" autocomplete="new-password" required>
  </div>
  <p x-show="pwError" x-text="pwError"
     style="display:none; color:#721c24; background:#f8d7da; padding:8px 12px; border-radius:4px; margin:0 0 12px;"></p>
  <p>
    <button type="submit" class="btn btn-primary">Create Account</button>
  </p>
  <p style="font-size:0.9em;">Already have an account? <a href="/login">Log in</a></p>
</form>
{% endblock %}
