<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}App{% endblock %} | MVVM</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
    nav { margin-bottom: 20px; padding: 10px 0; border-bottom: 1px solid #ddd; display: flex; align-items: center; }
    nav a { margin-right: 15px; text-decoration: none; color: #0066cc; }
    nav a:hover { text-decoration: underline; }
    nav .nav-right { margin-left: auto; margin-right: 0; }
    .flash { padding: 10px 15px; margin-bottom: 15px; border-radius: 4px; }
    .flash-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .flash-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .flash-info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    .btn { display: inline-block; padding: 6px 12px; text-decoration: none; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .btn-primary { background: #0066cc; color: white; border-color: #0066cc; }
    .btn-danger { background: #dc3545; color: white; border-color: #dc3545; }
    .btn-sm { padding: 3px 8px; font-size: 12px; }
    input[type="text"], textarea { width: 100%; padding: 8px; margin: 5px 0 15px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    textarea { height: 150px; }
    label { font-weight: bold; }
  </style>
</head>
<body>
  <nav>
    <a href="/">Home</a>
    <a href="/notes">Notes</a>
    <a href="/tags">Tags</a>
    <a href="/tests" target="_blank">Tests</a>
    <span id="nav-out" style="margin-left:auto; display:flex; gap:8px; align-items:center;">
      <a href="/login" class="btn btn-sm">Log In</a>
      <a href="/signup" class="btn btn-primary btn-sm">Sign Up</a>
    </span>
    <span id="nav-in" style="margin-left:auto; display:none; align-items:center; gap:8px;">
      <span id="nav-username" style="font-size:0.9em; color:#555;"></span>
      <form id="logout-form" method="post" action="/logout" style="display:inline;">
        <button type="submit" class="btn btn-sm">Log Out</button>
      </form>
    </span>
    <a href="/dist/en/index.html" target="_blank" class="btn btn-primary btn-sm" style="margin-left:8px;">XjMVVM Docs</a>
  </nav>
  {% if flash %}
  <div class="flash flash-{{ flash.type }}">{{ flash.message }}</div>
  {% endif %}
  <div id="_client-flash" style="display:none"></div>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
    (function () {
      // Client-side flash (fallback when Xojo session doesn't persist across SSR requests)
      var msg  = sessionStorage.getItem('_flash_msg');
      var type = sessionStorage.getItem('_flash_type') || 'success';
      sessionStorage.removeItem('_flash_msg');
      sessionStorage.removeItem('_flash_type');
      if (msg && !document.querySelector('.flash')) {
        var el = document.getElementById('_client-flash');
        el.className = 'flash flash-' + type;
        el.textContent = msg;
        el.style.display = '';
      }

      // Auth nav: show logged-in or logged-out state based on localStorage
      var user   = localStorage.getItem('_auth_user');
      var navOut = document.getElementById('nav-out');
      var navIn  = document.getElementById('nav-in');
      if (user) {
        document.getElementById('nav-username').textContent = user;
        navOut.style.display = 'none';
        navIn.style.display  = 'flex';
      }

      // Logout: clear auth state and set flash before POST
      document.getElementById('logout-form').addEventListener('submit', function () {
        localStorage.removeItem('_auth_user');
        sessionStorage.setItem('_flash_msg',  'You have been logged out.');
        sessionStorage.setItem('_flash_type', 'success');
      });
    })();
  </script>
</body>
</html>
