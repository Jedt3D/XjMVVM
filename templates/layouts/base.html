<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}App{% endblock %} | MVVM</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
    nav { margin-bottom: 20px; padding: 10px 0; border-bottom: 1px solid #ddd; display: flex; align-items: center; }
    nav a { margin-right: 15px; text-decoration: none; color: #0066cc; }
    nav a:hover { text-decoration: underline; }
    .nav-auth { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .flash { padding: 10px 15px; margin-bottom: 15px; border-radius: 4px; }
    .flash-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .flash-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .flash-info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    .btn { display: inline-block; padding: 6px 12px; text-decoration: none; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .btn-primary { background: #0066cc; color: white; border-color: #0066cc; }
    .btn-danger { background: #dc3545; color: white; border-color: #dc3545; }
    .btn-sm { padding: 3px 8px; font-size: 12px; }
    input[type="text"], textarea { width: 100%; padding: 8px; margin: 5px 0 15px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    textarea { height: 150px; }
    label { font-weight: bold; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body>
  <nav x-data="{ user: localStorage.getItem('_auth_user') }">
    <a href="/">Home</a>
    <a href="/notes">Notes</a>
    <a href="/tags">Tags</a>
    <a href="/tests" target="_blank">Tests</a>
    <span class="nav-auth" x-show="!user">
      <a href="/login" class="btn btn-sm">Log In</a>
      <a href="/signup" class="btn btn-primary btn-sm">Sign Up</a>
    </span>
    <span class="nav-auth" x-show="user" x-cloak>
      <span x-text="user" style="font-size:0.9em; color:#555;"></span>
      <form method="post" action="/logout" style="display:inline;"
            @submit="localStorage.removeItem('_auth_user'); sessionStorage.setItem('_flash_msg', 'You have been logged out.'); sessionStorage.setItem('_flash_type', 'success');">
        <button type="submit" class="btn btn-sm">Log Out</button>
      </form>
    </span>
    <a href="/dist/en/index.html" target="_blank" class="btn btn-primary btn-sm" style="margin-left:8px;">XjMVVM Docs</a>
  </nav>

  {% if flash %}
  <div class="flash flash-{{ flash.type }}">{{ flash.message }}</div>
  {% endif %}

  <div x-data="{
    msg: '',
    type: 'success',
    init() {
      var m = sessionStorage.getItem('_flash_msg');
      var t = sessionStorage.getItem('_flash_type') || 'success';
      sessionStorage.removeItem('_flash_msg');
      sessionStorage.removeItem('_flash_type');
      if (m && !document.querySelector('.flash')) { this.msg = m; this.type = t; }
    }
  }" x-show="msg" :class="'flash flash-' + type" x-text="msg" style="display:none"></div>

  <main>
    {% block content %}{% endblock %}
  </main>

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
</body>
</html>
