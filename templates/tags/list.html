{% extends "layouts/base.html" %}

{% block title %}Tags{% endblock %}

{% block content %}
<h1>Tags</h1>
<p><a href="/tags/new" class="btn btn-primary">New Tag</a></p>

{% if tags %}
<table style="width:100%; border-collapse:collapse;">
  <thead>
    <tr style="border-bottom:2px solid #ddd; text-align:left;">
      <th style="padding:8px;">Name</th>
      <th style="padding:8px;">Created</th>
      <th style="padding:8px;">Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for tag in tags %}
    <tr style="border-bottom:1px solid #eee;">
      <td style="padding:8px;"><a href="/tags/{{ tag.id }}">{{ tag.name }}</a></td>
      <td style="padding:8px;">{{ tag.created_at }}</td>
      <td style="padding:8px;">
        <a href="/tags/{{ tag.id }}/edit" class="btn btn-sm">Edit</a>
        <form method="post" action="/tags/{{ tag.id }}/delete" style="display:inline;">
          <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Delete this tag?')">Delete</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<p>No tags yet. Create your first one!</p>
{% endif %}
{% endblock %}
